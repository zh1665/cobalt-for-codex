# Cobalt for CodeX theme fragment for Codex Desktop.
# Apply with the installer at the repository root.

[desktop]
appearanceTheme = "dark"
appearanceLightCodeThemeId = "cobalt"
appearanceDarkCodeThemeId = "cobalt"

[desktop.appearanceLightChromeTheme]
accent = "#ffc600"
contrast = 55
ink = "#002240"
opaqueWindows = true
surface = "#f4f8ff"

[desktop.appearanceLightChromeTheme.fonts]

[desktop.appearanceLightChromeTheme.semanticColors]
diffAdded = "#3ad900"
diffRemoved = "#ff628c"
skill = "#ffc600"

[desktop.appearanceDarkChromeTheme]
accent = "#ffc600"
contrast = 65
ink = "#ffffff"
opaqueWindows = true
surface = "#002240"

[desktop.appearanceDarkChromeTheme.fonts]
code = '"Jetbrains Mono"'
ui = "Inter"

[desktop.appearanceDarkChromeTheme.semanticColors]
diffAdded = "#3ad900"
diffRemoved = "#ff628c"
skill = "#ffc600"
